<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knossos - Digital Guide with Sound</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --knossos-red: #8b0000;
            --parchment: #fdf5e6;
            --stone: #3a3a3a;
            --gold: #c5a059;
        }

        body {
            background-color: #121212;
            color: var(--stone);
            font-family: 'Lora', serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        .museum-card {
            background-color: var(--parchment);
            max-width: 500px;
            width: 100%;
            min-height: 100vh;
            padding: 25px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            border-left: 1px solid var(--gold);
            border-right: 1px solid var(--gold);
            box-sizing: border-box;
            position: relative;
        }

        header {
            text-align: center;
            border-bottom: 2px solid var(--knossos-red);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        h1 {
            font-family: 'Cinzel', serif;
            color: var(--knossos-red);
            margin: 0;
            font-size: 1.3rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .language-switcher {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }

        .flag {
            font-size: 24px;
            cursor: pointer;
            filter: grayscale(100%);
            transition: 0.3s;
            opacity: 0.6;
        }

        .flag.active {
            filter: grayscale(0%);
            transform: scale(1.2);
            opacity: 1;
        }

        /* MENU BUTTONS */
        #main-menu {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        .menu-btn {
            background-color: white;
            border: 1px solid var(--gold);
            padding: 22px;
            font-family: 'Cinzel', serif;
            color: var(--knossos-red);
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 2px 4px 8px rgba(0,0,0,0.1);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .menu-btn:active {
            transform: scale(0.98);
            background-color: #eee;
        }

        /* CONTENT SECTIONS */
        .content-view {
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        h2 {
            font-family: 'Cinzel', serif;
            color: var(--knossos-red);
            font-size: 1.2rem;
            border-bottom: 1px solid var(--gold);
            padding-bottom: 10px;
            margin-top: 0;
        }

        p {
            line-height: 1.8;
            text-align: justify;
            font-size: 1.05rem;
        }

        .back-btn {
            margin-top: 40px;
            padding: 18px;
            background-color: var(--stone);
            color: var(--parchment);
            text-align: center;
            font-family: 'Cinzel', serif;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .hero-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border: 2px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            margin-bottom: 25px;
        }

        .footer {
            margin-top: 60px;
            text-align: center;
            font-size: 0.7rem;
            color: #999;
            font-family: 'Cinzel', serif;
            border-top: 1px solid rgba(197, 160, 89, 0.3);
            padding-top: 20px;
        }
    </style>
</head>
<body>

<audio id="stoneSound" preload="auto">
    <source src="https://www.soundjay.com/nature/sounds/rock-hit-1.mp3" type="audio/mpeg">
</audio>

<div class="museum-card">
    <header>
        <h1 id="main-title">Knossos Guide</h1>
        <div class="language-switcher">
            <span class="flag active" onclick="changeLang('en', this)">🇬🇧</span>
            <span class="flag" onclick="changeLang('el', this)">🇬🇷</span>
            <span class="flag" onclick="setLanguageShortcut('de', this)">🇩🇪</span>
            <span class="flag" onclick="setLanguageShortcut('fr', this)">🇫🇷</span>
            <span class="flag" onclick="setLanguageShortcut('it', this)">🇮🇹</span>
        </div>
    </header>

    <div id="main-menu">
        <img src="knossos.jpg">
        <div class="menu-btn" onclick="openSection('arch')" id="btn-arch">Architecture</div>
        <div class="menu-btn" onclick="openSection('sea')" id="btn-sea">The Sea Lords</div>
        <div class="menu-btn" onclick="openSection('myth')" id="btn-myth">The Labyrinth</div>
        <div class="menu-btn" onclick="openSection('end')" id="btn-end">The Mystery</div>
    </div>

    <div id="content-view" class="content-view">
        <h2 id="view-title"></h2>
        <p id="view-text"></p>
        <div class="back-btn" onclick="closeSection()" id="btn-back">← Back to Menu</div>
    </div>

    <div class="footer">
        KNOSSOS • CRETE • EST. 1900 BC
    </div>
</div>

<script>
    let currentLang = 'en';
    const clickSound = document.getElementById('stoneSound');

    // Λειτουργία αναπαραγωγής ήχου
    function playStone() {
        clickSound.currentTime = 0; // Επαναφορά στην αρχή για γρήγορα κλικ
        clickSound.play();
    }

    const data = {
        en: {
            mainTitle: "Knossos: Digital Guide",
            btnBack: "← Back to Menu",
            sections: {
                arch: { title: "The Architectural Marvel", text: "The Palace featured 1,300 rooms, multi-story engineering, and the world's first advanced drainage systems.", btn: "Architecture" },
                sea: { title: "Thalassocracy: Sea Lords", text: "The Minoans dominated Mediterranean trade through their superior naval fleet, needing no defensive walls.", btn: "The Sea Lords" },
                myth: { title: "The Bull & Labyrinth", text: "Sacred bull-leaping rituals inspired the myth of the Minotaur hidden within King Minos's complex maze.", btn: "The Labyrinth" },
                end: { title: "The Radiant Eclipse", text: "Around 1450 BC, the civilization faced a sudden end. Volcanic eruptions or invasions? The mystery remains.", btn: "The Mystery" }
            }
        },
        el: {
            mainTitle: "Κνωσός: Ψηφιακός Οδηγός",
            btnBack: "← Επιστροφή στο Μενού",
            sections: {
                arch: { title: "Αρχιτεκτονικό Θαύμα", text: "Το Ανάκτορο διέθετε 1.300 δωμάτια, πολυώροφα κτίρια και τα πρώτα εξελιγμένα συστήματα αποχέτευσης.", btn: "Η Αρχιτεκτονικη" },
                sea: { title: "Θαλασσοκρατία", text: "Οι Μινωίτες κυριαρχούσαν στο εμπόριο της Μεσογείου χάρη στον πανίσχυρο στόλο τους, χωρίς την ανάγκη τειχών.", btn: "Οι Θαλασσοκρατορες" },
                myth: { title: "Ο Ταύρος & Ο Λαβύρινθος", text: "Τα ιερά Ταυροκαθάψια ενέπνευσαν τον μύθο του Μινώταυρου που ζούσε στον δαιδαλώδη Λαβύρινθο.", btn: "Ο Λαβυρινθος" },
                end: { title: "Το Μυστήριο του Τέλους", text: "Γύρω στο 1450 π.Χ., ο πολιτισμός παρήκμασε απότομα. Ηφαιστειακές εκρήξεις ή εισβολές; Το αίνιγμα παραμένει.", btn: "Το Μυστηριο" }
            }
        },
        de: { mainTitle: "Knossos: Guide", btnBack: "← Zurück", sections: { arch: {title:"Architektur", text:"1.300 Zimmer und Abwassersysteme.", btn:"Architektur"}, sea: {title:"Seemacht", text:"Herren des Mittelmeers.", btn:"Seemacht"}, myth: {title:"Labyrinth", text:"Minotaurus Legende.", btn:"Labyrinth"}, end: {title:"Das Ende", text:"Rätselhafter Untergang.", btn:"Rätsel"} } },
        fr: { mainTitle: "Cnossos: Guide", btnBack: "← Retour", sections: { arch: {title:"Architecture", text:"Un palais de 1 300 pièces.", btn:"Architecture"}, sea: {title:"Maîtres des Mers", text:"Thalassocratie Minoenne.", btn:"Mer"}, myth: {title:"Labyrinthe", text:"La légende du Minotaure.", btn:"Labyrinthe"}, end: {title:"Le Mystère", text:"La fin subite de Cnossos.", btn:"Mystère"} } },
        it: { mainTitle: "Cnosso: Guida", btnBack: "← Indietro", sections: { arch: {title:"Architettura", text:"Palazzo di 1.300 stanze.", btn:"Architettura"}, sea: {title:"Signori del Mare", text:"Potenza navale minoica.", btn:"Mare"}, myth: {title:"Il Labirinto", text:"Il mito del Minotauro.", btn:"Labirinto"}, end: {title:"Il Mistero", text:"La fine della civiltà.", btn:"Mistero"} } }
    };

    function changeLang(lang, el) {
        currentLang = lang;
        document.querySelectorAll('.flag').forEach(f => f.classList.remove('active'));
        el.classList.add('active');
        
        document.getElementById('main-title').innerText = data[lang].mainTitle;
        document.getElementById('btn-back').innerText = data[lang].btnBack;
        document.getElementById('btn-arch').innerText = data[lang].sections.arch.btn;
        document.getElementById('btn-sea').innerText = data[lang].sections.sea.btn;
        document.getElementById('btn-myth').innerText = data[lang].sections.myth.btn;
        document.getElementById('btn-end').innerText = data[lang].sections.end.btn;
    }

    function setLanguageShortcut(lang, el) {
        playStone();
        changeLang(lang, el);
    }

    function openSection(id) {
        playStone();
        document.getElementById('main-menu').style.display = 'none';
        const view = document.getElementById('content-view');
        view.style.display = 'block';
        
        document.getElementById('view-title').innerText = data[currentLang].sections[id].title;
        document.getElementById('view-text').innerText = data[currentLang].sections[id].text;
    }

    function closeSection() {
        playStone();
        document.getElementById('content-view').style.display = 'none';
        document.getElementById('main-menu').style.display = 'flex';
    }

    // Αρχικοποίηση
    changeLang('en', document.querySelector('.flag'));
</script>

</body>
</html>
