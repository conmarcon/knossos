<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knossos - The Palace of Legends</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --knossos-red: #8b0000;
            --parchment: #fdf5e6;
            --stone: #4a4a4a;
            --gold: #c5a059;
        }

        body {
            background-color: #1a1a1a;
            color: var(--stone);
            font-family: 'Lora', serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        .museum-card {
            background-color: var(--parchment);
            max-width: 600px;
            width: 92%;
            margin: 20px auto;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            border: 1px solid var(--gold);
            position: relative;
        }

        /* Διακοσμητική γωνία */
        .museum-card::before {
            content: '';
            position: absolute;
            top: 8px; left: 8px; right: 8px; bottom: 8px;
            border: 1px solid var(--gold);
            pointer-events: none;
            opacity: 0.5;
        }

        header {
            text-align: center;
            border-bottom: 2px solid var(--knossos-red);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Cinzel', serif;
            color: var(--knossos-red);
            margin: 0;
            font-size: 1.6rem;
            letter-spacing: 1px;
        }

        .language-switcher {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 15px;
        }

        .flag {
            font-size: 26px;
            cursor: pointer;
            transition: all 0.3s ease;
            filter: grayscale(80%);
            opacity: 0.6;
        }

        .flag:hover, .flag.active {
            transform: scale(1.2) translateY(-3px);
            filter: grayscale(0%);
            opacity: 1;
        }

        /* Πλαίσιο Εικόνας */
        .image-box {
            width: 100%;
            background: #eee;
            margin: 20px 0;
            border: 4px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            overflow: hidden;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-box img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Αν η εικόνα λείπει, δείξε αυτό το κείμενο */
        .image-box:empty::after {
            content: "The Palace of Knossos";
            font-family: 'Cinzel', serif;
            color: #ccc;
        }

        .caption {
            font-size: 0.85rem;
            text-align: center;
            font-style: italic;
            color: #666;
            margin-top: -10px;
            margin-bottom: 20px;
        }

        .content-section {
            line-height: 1.7;
            text-align: justify;
        }

        h2 {
            font-family: 'Cinzel', serif;
            color: var(--knossos-red);
            font-size: 1.1rem;
            margin-top: 25px;
            border-bottom: 1px solid #ddd;
        }

        .footer {
            margin-top: 40px;
            text-align: center;
            font-size: 0.85rem;
            border-top: 1px solid var(--gold);
            padding-top: 15px;
            color: #888;
        }
    </style>
</head>
<body>

<div class="museum-card">
    <header>
        <h1 id="main-title">Knossos</h1>
        <div class="language-switcher">
            <span class="flag active" onclick="setLanguage('en', this)">🇬🇧</span>
            <span class="flag" onclick="setLanguage('el', this)">🇬🇷</span>
            <span class="flag" onclick="setLanguage('de', this)">🇩🇪</span>
            <span class="flag" onclick="setLanguage('fr', this)">🇫🇷</span>
            <span class="flag" onclick="setLanguage('it', this)">🇮🇹</span>
        </div>
    </header>

    <div class="image-box">
        <img src="https://images.unsplash.com/photo-1605101101291-56c6d64c740a?auto=format&fit=crop&w=800&q=80" 
             alt="Knossos Palace" 
             onerror="this.style.display='none'; this.parentElement.innerHTML='<div style=\'padding:40px; color:#999; font-family:Cinzel\'>The Palace of Knossos</div>'">
    </div>
    <div class="caption" id="img-caption">The North Entrance of the Palace</div>

    <div class="content-section">
        <p id="intro" style="font-weight: bold; color: var(--knossos-red);"></p>
        
        <h2 id="h2-lab">The Labyrinth</h2>
        <p id="p-lab"></p>

        <h2 id="h2-disc">The Legend</h2>
        <p id="p-disc"></p>
    </div>

    <div class="footer" id="foot">
        Knossos Heritage Site | Crete
    </div>
</div>

<script>
    const translations = {
        en: {
            title: "Knossos: Palace of Legends",
            caption: "The North Entrance of the Palace",
            intro: "Welcome to the center of the Minoan world, the oldest city in Europe.",
            labT: "The Labyrinth",
            labP: "Myth says Daedalus built a maze for King Minos to hide the Minotaur. Only Theseus escaped with Ariadne's thread.",
            discT: "Historical Significance",
            discP: "Knossos was the seat of power for the first advanced civilization of the West, dating back to 1900 BC.",
            foot: "Knossos Heritage Site | Crete"
        },
        el: {
            title: "Κνωσός: Το Παλάτι των Θρύλων",
            caption: "Η Βόρεια Είσοδος του Ανακτόρου",
            intro: "Καλώς ήρθατε στο κέντρο του Μινωικού κόσμου, την αρχαιότερη πόλη της Ευρώπης.",
            labT: "Ο Λαβύρινθος",
            labP: "Ο μύθος λέει ότι ο Δαίδαλος έχτισε ένα λαβύρινθο για τον Μινώταυρο. Μόνο ο Θησέας δραπέτευσε με τον Μίτο της Αριάδνης.",
            discT: "Ιστορική Σημασία",
            discP: "Η Κνωσός ήταν η έδρα της εξουσίας για τον πρώτο προηγμένο πολιτισμό της Δύσης, ήδη από το 1900 π.Χ.",
            foot: "Αρχαιολογικός Χώρος Κνωσού | Κρήτη"
        },
        de: {
            title: "Knossos: Palast der Legenden",
            caption: "Der Nordeingang des Palastes",
            intro: "Willkommen im Zentrum der minoischen Welt, der ältesten Stadt Europas.",
            labT: "Das Labyrinth",
            labP: "Die Legende besagt, dass Daedalus ein Labyrinth für den Minotaurus baute. Nur Theseus entkam mit Ariadnes Faden.",
            discT: "Historische Bedeutung",
            discP: "Knossos war der Machtsitz der ersten Hochkultur des Westens, die bis 1900 v. Chr. zurückreicht.",
            foot: "Erbe von Knossos | Kreta"
        },
        fr: {
            title: "Cnossos : Le Palais des Légendes",
            caption: "L'entrée nord du palais",
            intro: "Bienvenue au centre du monde minoen, la plus ancienne ville d'Europe.",
            labT: "Le Labyrinthe",
            labP: "Le mythe raconte que Dédale a construit un labyrinthe pour le Minotaure. Seul Thésée s'est échappé grâce au fil d'Ariane.",
            discT: "Signification Historique",
            discP: "Cnossos était le siège du pouvoir de la première civilisation avancée de l'Occident, datant de 1900 avant J.-C.",
            foot: "Site du patrimoine de Cnossos | Crète"
        },
        it: {
            title: "Cnosso: Il Palazzo delle Leggende",
            caption: "L'ingresso nord del palazzo",
            intro: "Benvenuti nel centro del mondo minoico, la città più antica d'Europa.",
            labT: "Il Labirinto",
            labP: "Il mito dice che Dedalo costruì un labirinto per il Minotauro. Solo Teseo fuggì con il filo di Arianna.",
            discT: "Significato Storico",
            discP: "Cnosso era la sede del potere della prima civiltà avanzata dell'Occidente, risalente al 1900 a.C.",
            foot: "Sito del patrimonio di Cnosso | Creta"
        }
    };

    function setLanguage(lang, element) {
        document.getElementById('main-title').innerText = translations[lang].title;
        document.getElementById('img-caption').innerText = translations[lang].caption;
        document.getElementById('intro').innerText = translations[lang].intro;
        document.getElementById('h2-lab').innerText = translations[lang].labT;
        document.getElementById('p-lab').innerText = translations[lang].labP;
        document.getElementById('h2-disc').innerText = translations[lang].discT;
        document.getElementById('p-disc').innerText = translations[lang].discP;
        document.getElementById('foot').innerText = translations[lang].foot;

        document.querySelectorAll('.flag').forEach(f => f.classList.remove('active'));
        element.classList.add('active');
    }

    setLanguage('en', document.querySelector('.flag'));
</script>

</body>
</html>
